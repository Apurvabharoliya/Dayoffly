<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Leave Status - Enhanced Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    thead tr { background-color: #e6f2ff; }
    thead th { color: #1e40af; font-weight: 600; }
    .details-row { transition: all 180ms ease-in-out; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .rotate-180 { transform: rotate(180deg); }
    .stats-card { transition: transform 0.2s; }
    .stats-card:hover { transform: translateY(-3px); }
    .pagination-btn { transition: all 0.2s; }
    .pagination-btn:hover:not(.disabled) { background-color: #3b82f6; color: white; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800">
  <div class="max-w-7xl mx-auto p-4 md:p-6">
    <header class="flex flex-col md:flex-row items-start md:items-center justify-between mb-6 gap-4">
      <div>
        <h1 class="text-2xl md:text-3xl font-semibold mb-1 flex items-center gap-2">
          <i class="fas fa-calendar-alt text-blue-500"></i>
          Leave Status Dashboard
        </h1>
        <p class="text-sm text-gray-500">Track progress and view approver notes, documents and balances.</p>
      </div>
      <div class="text-sm text-gray-500 flex items-center gap-2" id="last-updated">
        <i class="fas fa-sync-alt text-blue-500"></i>
        Updated: --
      </div>
    </header>

    <!-- Statistics Section -->
    <section class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-6" id="stats-section">
      <!-- Stats will be populated by JavaScript -->
    </section>

    <!-- Filters and Actions Section -->
    <section class="bg-white rounded-xl shadow-sm border p-4 mb-6">
      <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div class="w-full md:w-auto">
          <label class="block text-sm font-medium text-gray-700 mb-1">Search</label>
          <div class="relative">
            <input type="text" id="search-input" placeholder="Search requests..." 
                   class="border rounded-lg px-4 py-2 pl-10 w-full md:w-64 focus:ring-blue-500 focus:border-blue-500">
            <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
          </div>
        </div>
        
        <div class="flex flex-col md:flex-row gap-3 w-full md:w-auto">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Filter by Status</label>
            <select id="filter-status" class="border rounded-lg px-3 py-2 w-full md:w-40 focus:ring-blue-500 focus:border-blue-500">
              <option value="all">All Status</option>
              <option value="pending">Pending</option>
              <option value="approved">Approved</option>
              <option value="rejected">Rejected</option>
              <option value="cancelled">Cancelled</option>
              <option value="escalated">Escalated</option>
            </select>
          </div>
          
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Sort by</label>
            <select id="sort-by" class="border rounded-lg px-3 py-2 w-full md:w-40 focus:ring-blue-500 focus:border-blue-500">
              <option value="appliedDate">Applied Date (Newest)</option>
              <option value="appliedDateOldest">Applied Date (Oldest)</option>
              <option value="startDate">Start Date</option>
              <option value="employee">Employee</option>
              <option value="status">Status</option>
            </select>
          </div>
          
          <div class="flex items-end">
            <button id="export-btn" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg flex items-center gap-2 w-full md:w-auto justify-center">
              <i class="fas fa-download"></i>
              Export
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- Main Table Section -->
    <section class="bg-white rounded-xl shadow-sm border p-4 mb-6">
      <div class="overflow-x-auto relative">
        <div id="loading-indicator" class="absolute inset-0 flex items-center justify-center bg-white bg-opacity-80 z-10 hidden">
          <div class="flex flex-col items-center">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-500"></div>
            <p class="mt-2 text-gray-600">Loading data...</p>
          </div>
        </div>
        
        <table class="w-full border-collapse">
          <thead>
            <tr class="text-sm">
              <th class="p-3 text-left">Request ID</th>
              <th class="p-3 text-left">Employee</th>
              <th class="p-3 text-left">Leave Type</th>
              <th class="p-3 text-left">Duration</th>
              <th class="p-3 text-left">Applied Date</th>
              <th class="p-3 text-left">Status</th>
              <th class="p-3 text-left">Leave Balance Impact</th>
              <th class="p-3 text-right">Actions</th>
            </tr>
          </thead>
          <tbody id="requests-tbody" class="text-sm">
            <!-- rows generated by JS -->
          </tbody>
        </table>
        
        <!-- Empty State -->
        <div id="empty-state" class="hidden py-12 text-center">
          <i class="fas fa-inbox text-4xl text-gray-300 mb-3"></i>
          <p class="text-gray-500">No leave requests found</p>
          <p class="text-sm text-gray-400 mt-1">Try changing your filters or search term</p>
        </div>
      </div>
      
      <!-- Pagination -->
      <div class="flex flex-col md:flex-row items-center justify-between mt-6 px-2" id="pagination-controls">
        <div class="text-sm text-gray-500 mb-4 md:mb-0" id="pagination-info"></div>
        <div class="flex gap-1" id="pagination-buttons"></div>
      </div>
    </section>
  </div>

  <script>
    // Data
    const requests = [
      {
        requestId: 'RID1', empName: 'Milli Jethwani', empId: 'EMP2001', department: 'Sales', designation: 'Executive',
        leaveType: 'Casual Leave', startDate: '2025-09-20', endDate: '2025-09-22', totalDays: 3, appliedDate: '2025-09-10',
        status: 'pending', balanceBefore: '6', balanceAfter: '3', approverName: 'Rohit Mehra', approverDesignation: 'Sales Manager',
        decisionDate: '--', remarks: '--', documents: [], logs: [ {time:'2025-09-10 09:12', entry:'Applied by employee'} ]
      },
      {
        requestId: 'RID2', empName: 'Apurva Bharoliya', empId: 'EMP2002', department: 'Engineering', designation: 'Sr. Engineer',
        leaveType: 'Sick Leave', startDate: '2025-09-05', endDate: '2025-09-07', totalDays: 3, appliedDate: '2025-09-04',
        status: 'approved', balanceBefore: '10', balanceAfter: '7', approverName: 'Meera Kapoor', approverDesignation: 'Team Lead',
        decisionDate: '2025-09-04', remarks: 'Medical certificate accepted.', documents: ['Medical_Certificate_Apurva_Bharoliya.pdf'], logs: [ {time:'2025-09-04 08:23', entry:'Applied by employee'}, {time:'2025-09-04 14:02', entry:'Approved by Team Lead'} ]
      },
      {
        requestId: 'RID3', empName: 'Dhruvi Patel', empId: 'EMP2003', department: 'HR', designation: 'HR Executive',
        leaveType: 'Work From Home', startDate: '2025-09-15', endDate: '2025-09-15', totalDays: 1, appliedDate: '2025-09-14',
        status: 'rejected', balanceBefore: '4', balanceAfter: '4', approverName: 'Anil Verma', approverDesignation: 'HR Manager',
        decisionDate: '2025-09-14', remarks: 'Team needs on-site presence that day.', documents: [], logs: [ {time:'2025-09-14 11:20', entry:'Applied by employee'}, {time:'2025-09-14 13:30', entry:'Rejected by HR Manager'} ]
      },
      {
        requestId: 'RID4', empName: 'Het Patel', empId: 'EMP2004', department: 'Finance', designation: 'Analyst',
        leaveType: 'Earned Leave', startDate: '2025-09-25', endDate: '2025-09-28', totalDays: 4, appliedDate: '2025-09-18',
        status: 'cancelled', balanceBefore: '12', balanceAfter: '12', approverName: 'Kavita Rao', approverDesignation: 'Finance Manager',
        decisionDate: '2025-09-19', remarks: 'Cancelled by employee.', documents: [], logs: [ {time:'2025-09-18 09:00', entry:'Applied by employee'}, {time:'2025-09-19 08:00', entry:'Cancelled by employee'} ]
      },
      {
        requestId: 'RID5', empName: 'Jeal Rajpal', empId: 'EMP2005', department: 'IT', designation: 'Software Engineer',
        leaveType: 'Casual Leave', startDate: '2025-09-30', endDate: '2025-10-02', totalDays: 3, appliedDate: '2025-09-20',
        status: 'escalated', balanceBefore: '8', balanceAfter: '5', approverName: 'Rajesh Sharma', approverDesignation: 'Project Manager',
        decisionDate: '--', remarks: 'Escalated to higher authority.', documents: [], logs: [ {time:'2025-09-20 09:10', entry:'Applied by employee'}, {time:'2025-09-21 10:00', entry:'Escalated by manager'} ]
      }
    ];

    const statusMap = {
      pending: { text: 'Pending', classes: 'bg-yellow-100 text-yellow-800 border border-yellow-200', icon: 'clock' },
      approved: { text: 'Approved', classes: 'bg-green-100 text-green-800 border border-green-200', icon: 'check-circle' },
      rejected: { text: 'Rejected', classes: 'bg-red-100 text-red-800 border border-red-200', icon: 'times-circle' },
      cancelled: { text: 'Cancelled', classes: 'bg-gray-100 text-gray-800 border border-gray-200', icon: 'ban' },
      escalated: { text: 'Escalated', classes: 'bg-orange-100 text-orange-800 border border-orange-200', icon: 'exclamation-circle' }
    };

    // Configuration
    const ITEMS_PER_PAGE = 3;
    let currentPage = 1;
    let currentFilter = 'all';
    let currentSort = 'appliedDate';
    let currentSearch = '';

    // Format documents list
    function formatDocs(arr){
      if(!arr || arr.length === 0) return '<div class="text-xs text-gray-500 italic">No documents submitted</div>';
      return arr.map(d => `
        <div class="flex items-center gap-2 text-sm mb-1">
          <i class="fas fa-file-pdf text-red-500"></i>
          <a href="${d}" target="_blank" class="text-blue-500 hover:underline truncate">${d}</a>
        </div>
      `).join('');
    }

    // Format logs
    function formatLogs(logs){
      if(!logs || logs.length === 0) return '<li class="text-xs text-gray-500 italic">No logs available</li>';
      return logs.map(l => `
        <li class="mb-2 border-l-2 border-blue-200 pl-2 py-1">
          <div class="text-xs text-gray-500">${l.time}</div>
          <div class="text-sm">${l.entry}</div>
        </li>
      `).join('');
    }

    // Render statistics cards
    function renderStats() {
      const statsSection = document.getElementById('stats-section');
      const statusCounts = {
        all: requests.length,
        pending: requests.filter(r => r.status === 'pending').length,
        approved: requests.filter(r => r.status === 'approved').length,
        rejected: requests.filter(r => r.status === 'rejected').length,
        cancelled: requests.filter(r => r.status === 'cancelled').length,
        escalated: requests.filter(r => r.status === 'escalated').length
      };

      const stats = [
        { title: 'Total Requests', value: statusCounts.all, color: 'bg-blue-500', icon: 'list-alt' },
        { title: 'Pending', value: statusCounts.pending, color: 'bg-yellow-500', icon: 'clock' },
        { title: 'Approved', value: statusCounts.approved, color: 'bg-green-500', icon: 'check-circle' },
        { title: 'Rejected', value: statusCounts.rejected, color: 'bg-red-500', icon: 'times-circle' },
        { title: 'Other', value: statusCounts.cancelled + statusCounts.escalated, color: 'bg-gray-500', icon: 'ellipsis-h' }
      ];

      statsSection.innerHTML = stats.map(stat => `
        <div class="stats-card bg-white rounded-lg shadow-sm border p-4 flex items-center justify-between fade-in">
          <div>
            <p class="text-sm text-gray-500">${stat.title}</p>
            <p class="text-2xl font-bold">${stat.value}</p>
          </div>
          <div class="${stat.color} rounded-full h-12 w-12 flex items-center justify-center">
            <i class="fas fa-${stat.icon} text-white"></i>
          </div>
        </div>
      `).join('');
    }

    // Filter and sort requests
    function getFilteredAndSortedRequests() {
      let filtered = [...requests];
      
      // Apply status filter
      if (currentFilter !== 'all') {
        filtered = filtered.filter(req => req.status === currentFilter);
      }
      
      // Apply search filter
      if (currentSearch) {
        const searchTerm = currentSearch.toLowerCase();
        filtered = filtered.filter(req => 
          req.requestId.toLowerCase().includes(searchTerm) ||
          req.empName.toLowerCase().includes(searchTerm) ||
          req.leaveType.toLowerCase().includes(searchTerm) ||
          req.department.toLowerCase().includes(searchTerm)
        );
      }
      
      // Apply sorting
      switch(currentSort) {
        case 'appliedDate':
          filtered.sort((a, b) => new Date(b.appliedDate) - new Date(a.appliedDate));
          break;
        case 'appliedDateOldest':
          filtered.sort((a, b) => new Date(a.appliedDate) - new Date(b.appliedDate));
          break;
        case 'startDate':
          filtered.sort((a, b) => new Date(a.startDate) - new Date(b.startDate));
          break;
        case 'employee':
          filtered.sort((a, b) => a.empName.localeCompare(b.empName));
          break;
        case 'status':
          filtered.sort((a, b) => a.status.localeCompare(b.status));
          break;
      }
      
      return filtered;
    }

    // Render pagination controls
    function renderPagination(totalItems) {
      const totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE);
      const paginationButtons = document.getElementById('pagination-buttons');
      const paginationInfo = document.getElementById('pagination-info');
      
      if (totalPages <= 1) {
        paginationButtons.innerHTML = '';
        paginationInfo.textContent = totalItems > 0 ? `Showing all ${totalItems} requests` : '';
        return;
      }
      
      // Update pagination info
      const startItem = (currentPage - 1) * ITEMS_PER_PAGE + 1;
      const endItem = Math.min(currentPage * ITEMS_PER_PAGE, totalItems);
      paginationInfo.textContent = `Showing ${startItem}-${endItem} of ${totalItems} requests`;
      
      // Create pagination buttons
      let buttons = '';
      
      // Previous button
      buttons += `
        <button class="pagination-btn px-3 py-1 rounded border ${currentPage === 1 ? 'disabled opacity-50' : ''}" 
                ${currentPage === 1 ? 'disabled' : ''} data-page="${currentPage - 1}">
          <i class="fas fa-chevron-left"></i>
        </button>
      `;
      
      // Page buttons
      for (let i = 1; i <= totalPages; i++) {
        buttons += `
          <button class="pagination-btn px-3 py-1 rounded border ${currentPage === i ? 'bg-blue-500 text-white' : ''}" 
                  data-page="${i}">${i}</button>
        `;
      }
      
      // Next button
      buttons += `
        <button class="pagination-btn px-3 py-1 rounded border ${currentPage === totalPages ? 'disabled opacity-50' : ''}" 
                ${currentPage === totalPages ? 'disabled' : ''} data-page="${currentPage + 1}">
          <i class="fas fa-chevron-right"></i>
        </button>
      `;
      
      paginationButtons.innerHTML = buttons;
      
      // Add event listeners to pagination buttons
      document.querySelectorAll('.pagination-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          currentPage = parseInt(btn.getAttribute('data-page'));
          renderTable();
        });
      });
    }

    // Render table
    function renderTable(){
      // Show loading indicator
      const loadingIndicator = document.getElementById('loading-indicator');
      loadingIndicator.classList.remove('hidden');
      
      // Simulate loading (for demonstration purposes)
      setTimeout(() => {
        const tbody = document.getElementById('requests-tbody');
        const emptyState = document.getElementById('empty-state');
        tbody.innerHTML = '';
        
        const filteredRequests = getFilteredAndSortedRequests();
        const totalItems = filteredRequests.length;
        const totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE);
        
        // Adjust current page if it's out of bounds
        if (currentPage > totalPages) {
          currentPage = Math.max(1, totalPages);
        }
        
        // Calculate pagination slice
        const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
        const paginatedRequests = filteredRequests.slice(startIndex, startIndex + ITEMS_PER_PAGE);
        
        // Show empty state if no requests
        if (paginatedRequests.length === 0) {
          tbody.innerHTML = '';
          emptyState.classList.remove('hidden');
          loadingIndicator.classList.add('hidden');
          renderPagination(0);
          return;
        } else {
          emptyState.classList.add('hidden');
        }
        
        // Render table rows
        paginatedRequests.forEach(req => {
          const tr = document.createElement('tr');
          tr.className = 'border-b hover:bg-gray-50 fade-in';
          tr.setAttribute('data-status', req.status);
          tr.innerHTML = `
            <td class="p-3 align-top">
              <div class="font-semibold">${req.requestId}</div>
            </td>
            <td class="p-3 align-top">
              <div class="font-semibold">${req.empName}</div>
              <div class="text-xs text-gray-500">${req.empId} • ${req.department}</div>
              <div class="text-xs text-gray-500">${req.designation}</div>
            </td>
            <td class="p-3 align-top">${req.leaveType}</td>
            <td class="p-3 align-top">
              <div>${formatDate(req.startDate)} — ${formatDate(req.endDate)}</div>
              <div class="text-xs text-gray-500">${req.totalDays} day${req.totalDays !== 1 ? 's' : ''}</div>
            </td>
            <td class="p-3 align-top">${formatDate(req.appliedDate)}</td>
            <td class="p-3 align-top">
              <span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-medium ${statusMap[req.status].classes}">
                <i class="fas fa-${statusMap[req.status].icon}"></i>
                ${statusMap[req.status].text}
              </span>
            </td>
            <td class="p-3 align-top">
              <div class="flex items-center gap-2">
                <span class="text-gray-500">Before:</span>
                <span class="font-semibold">${req.balanceBefore}</span>
                <i class="fas fa-arrow-right text-gray-400 text-xs"></i>
                <span class="text-gray-500">After:</span>
                <span class="font-semibold">${req.balanceAfter}</span>
              </div>
            </td>
            <td class="p-3 align-top text-right">
              <button class="btn-details bg-blue-50 hover:bg-blue-100 text-blue-600 px-3 py-1.5 rounded-lg text-sm flex items-center gap-2 ml-auto">
                <span>Details</span>
                <i class="fas fa-chevron-down text-xs"></i>
              </button>
            </td>
          `;

          const detailsTr = document.createElement('tr');
          detailsTr.className = 'details-row bg-gray-50 hidden';
          detailsTr.innerHTML = `
            <td colspan="8" class="p-4">
              <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div>
                  <h3 class="font-medium mb-3 flex items-center gap-2 text-blue-600">
                    <i class="fas fa-user-check"></i>
                    Approver Details
                  </h3>
                  <div class="bg-white rounded-lg p-4 shadow-sm">
                    <div class="text-sm font-medium mb-1">${req.approverName}</div>
                    <div class="text-xs text-gray-500 mb-2">${req.approverDesignation}</div>
                    <div class="text-xs text-gray-500">Decision Date: ${req.decisionDate || '--'}</div>
                    <div class="mt-3">
                      <div class="text-xs text-gray-500 mb-1">Remarks:</div>
                      <div class="text-sm bg-gray-50 p-2 rounded">${req.remarks || 'No remarks provided'}</div>
                    </div>
                  </div>
                </div>
                <div>
                  <h3 class="font-medium mb-3 flex items-center gap-2 text-blue-600">
                    <i class="fas fa-file-alt"></i>
                    Supporting Documents
                  </h3>
                  <div class="bg-white rounded-lg p-4 shadow-sm h-full">
                    ${formatDocs(req.documents)}
                  </div>
                </div>
                <div>
                  <h3 class="font-medium mb-3 flex items-center gap-2 text-blue-600">
                    <i class="fas fa-history"></i>
                    Request History
                  </h3>
                  <div class="bg-white rounded-lg p-4 shadow-sm h-full">
                    <ul class="text-sm text-gray-600">${formatLogs(req.logs)}</ul>
                  </div>
                </div>
              </div>
            </td>
          `;

          tbody.appendChild(tr);
          tbody.appendChild(detailsTr);
        });

        // Add event listeners to details buttons
        document.querySelectorAll('.btn-details').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const mainRow = e.target.closest('tr');
            const detailsRow = mainRow.nextElementSibling;
            const icon = btn.querySelector('i');
            
            if (!detailsRow) return;
            
            // Toggle details row
            detailsRow.classList.toggle('hidden');
            
            // Rotate chevron icon
            icon.classList.toggle('rotate-180');
            
            // Change button text
            const span = btn.querySelector('span');
            span.textContent = detailsRow.classList.contains('hidden') ? 'Details' : 'Hide';
          });
        });

        // Hide loading indicator
        loadingIndicator.classList.add('hidden');
        
        // Render pagination
        renderPagination(totalItems);
      }, 500); // Simulate network delay
    }

    // Format date to a more readable format
    function formatDate(dateString) {
      if (!dateString || dateString === '--') return '--';
      
      const options = { year: 'numeric', month: 'short', day: 'numeric' };
      return new Date(dateString).toLocaleDateString(undefined, options);
    }

    // Export data as CSV
    function exportToCSV() {
      const filteredRequests = getFilteredAndSortedRequests();
      
      if (filteredRequests.length === 0) {
        alert('No data to export!');
        return;
      }
      
      // Create CSV content
      const headers = ['Request ID', 'Employee', 'Leave Type', 'Start Date', 'End Date', 'Total Days', 'Applied Date', 'Status'];
      let csvContent = headers.join(',') + '\n';
      
      filteredRequests.forEach(req => {
        const row = [
          req.requestId,
          req.empName,
          req.leaveType,
          req.startDate,
          req.endDate,
          req.totalDays,
          req.appliedDate,
          statusMap[req.status].text
        ];
        csvContent += row.join(',') + '\n';
      });
      
      // Create download link
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.setAttribute('href', url);
      link.setAttribute('download', `leave_requests_${new Date().toISOString().slice(0, 10)}.csv`);
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // Initialize the dashboard
    function initDashboard() {
      renderStats();
      renderTable();
      
      // Add event listeners
      document.getElementById('filter-status').addEventListener('change', (e) => {
        currentFilter = e.target.value;
        currentPage = 1;
        renderTable();
      });
      
      document.getElementById('sort-by').addEventListener('change', (e) => {
        currentSort = e.target.value;
        renderTable();
      });
      
      document.getElementById('search-input').addEventListener('input', (e) => {
        currentSearch = e.target.value;
        currentPage = 1;
        renderTable();
      });
      
      document.getElementById('export-btn').addEventListener('click', exportToCSV);
      
      // Update last updated time
      document.getElementById('last-updated').textContent = 'Updated: ' + new Date().toLocaleString();
    }

    // Initialize when DOM is loaded
    document.addEventListener('DOMContentLoaded', initDashboard);
  </script>
</body>
</html>
